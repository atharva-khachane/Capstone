# SL-RAG Pipeline Configuration
# Configuration for the Secure and Accurate RAG system

# Model settings
models:
  embedding_model: "sentence-transformers/all-mpnet-base-v2"
  embedding_dimension: 768
  cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  llm_model: "google/gemma-4-e4b"
  llm_quantization: "4bit"  # handled by LM Studio (GGUF E4B = ~4-bit)

# GPU settings
gpu:
  use_gpu: true
  batch_size: 32  # For embedding generation
  llm_batch_size: 1  # For LLM generation

# Chunking parameters
chunking:
  chunk_size: 512  # tokens
  overlap: 50  # tokens
  min_chunk_size: 100  # tokens

# Retrieval settings
retrieval:
  alpha: 0.7  # Weight for dense retrieval (1-alpha for BM25)
  bm25_alpha_param: 0.15  # BM25 weight (dense weight = 1 - bm25_alpha_param = 0.85)
  similarity_threshold: 0.5  # Minimum similarity score
  top_k_candidates: 30  # Initial retrieval count
  top_k_final: 8  # Final results after re-ranking
  tech_domain_alpha: 0.95  # Dense-heavy alpha for technical vocabulary domains
  tech_domains:  # Domains that benefit from dense-only retrieval
    - "telemetry"
    - "technical_report"

# Domain clustering (document-level, per ANTIGRAVITY_PROMPT.md Layer 2)
domain:
  min_clusters: 2
  max_clusters: 10
  auto_detect: true
  similarity_threshold: 0.3  # For query routing (ANTIGRAVITY_PROMPT_DOMAIN_FIX.md)
  top_k_domains: 3
  adaptive_threshold: true   # Trust-RAG 1B: entropy-based adaptive threshold

# Security settings
security:
  encryption_enabled: true
  pii_detection_enabled: true
  enable_ner: false  # NER-based name detection (requires spaCy model)
  sanitize_content: true

# Storage paths
storage:
  keys_dir: "./storage/keys"
  index_dir: "./storage/faiss_index"
  audit_logs_dir: "./storage/audit_logs"
  cache_dir: "./storage/cache"

# Document loading
document_loading:
  ocr_enabled: true
  max_file_size_mb: 200
  min_text_chars: 100

# LLM generation
llm:
  temperature: 0.3  # Lower = more focused answers
  max_new_tokens: 1500
  streaming: true  # Stream answers token-by-token via SSE

# Audit and compliance
audit:
  enabled: true
  retention_years: 7
  hash_chain_enabled: true  # Tamper-evident logging

# Monitoring/audit store security
monitoring:
  encrypt_db_at_rest: true
  db_path: "./storage/audit_logs/monitoring.db"

# Query result cache (retrieval stability + latency)
cache:
  enabled: true
  ttl_seconds: 3600   # Re-fetch after 1 hour (covers re-ingest cycles)
  max_entries: 200    # LRU eviction when exceeded

# Confidence calibration (Fix 1: ECE reduction via Platt scaling)
calibration:
  enabled: true
  min_samples: 30  # Fall back to clamp policy if fewer pairs available
  scaler_path: "./storage/calibration/platt_scaler.pkl"

# Performance
performance:
  concurrent_queries: 4
  cache_enabled: true
